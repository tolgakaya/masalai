name: Task
description: A DoR-complete unit of work (protocol §9.1)
labels: ['type:task']
body:
  - type: textarea
    id: goal
    attributes:
      label: Goal
      description: One or two sentences — the outcome, not the steps.
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: Checklist a reviewer can verify with fresh evidence (protocol §6.2).
      placeholder: |
        - [ ] ...
        - [ ] `pnpm check` green
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context pointers
      description: The exact doc sections / files to read (don't bulk-read).
      placeholder: docs/plan.md §X, docs/engineering-handbook.md §Y, ...
    validations:
      required: true
  - type: input
    id: scope
    attributes:
      label: Scope / out-of-scope
      description: What this issue does NOT cover.
    validations:
      required: false

# Local development infrastructure (engineering-handbook §306).
# Postgres 16, Redis 7, MinIO (local S3 stand-in for R2), Mailpit (SMTP catcher).
#   pnpm infra:up   -> start all in the background
#   pnpm infra:down -> stop and remove
# Credentials here are DEV-ONLY throwaways; real secrets live in Railway variables.
# Not for staging/production (those use managed Postgres/Redis + Cloudflare R2).

name: masalai-dev

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: masalai
      POSTGRES_PASSWORD: masalai
      POSTGRES_DB: masalai_dev
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U masalai -d masalai_dev']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

  # Local S3-compatible store standing in for Cloudflare R2.
  # API on :9000, web console on :9001.
  minio:
    image: minio/minio:latest # dev-only; pin a RELEASE.* tag before CI relies on it
    restart: unless-stopped
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio-data:/data
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 5s
      timeout: 5s
      retries: 10

  # SMTP catcher: apps send mail to :1025, inspect it at http://localhost:8025.
  mailpit:
    image: axllent/mailpit:latest # dev-only; pin a vX.Y tag before CI relies on it
    restart: unless-stopped
    ports:
      - '1025:1025'
      - '8025:8025'

volumes:
  postgres-data:
  redis-data:
  minio-data:
